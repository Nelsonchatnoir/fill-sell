workflows:
  capacitor-ios:
    name: Capacitor iOS Build
    max_build_duration: 60
    environment:
      node: 22
      xcode: latest
      vars:
        BUNDLE_ID: app.fillsell.app
      ios_signing:
        distribution_type: app_store
        bundle_identifier: app.fillsell.app
    integrations:
      app_store_connect: Codemagic
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Build web app
        script: npm run build
      - name: Sync Capacitor
        script: npx cap sync ios
      - name: Fix capacitor.config.json
        script: |
          cat > ios/App/App/capacitor.config.json << 'EOF'
          {
            "appId": "app.fillsell.app",
            "appName": "Fill & Sell",
            "webDir": "dist",
            "server": { "androidScheme": "https" },
            "plugins": {
              "SplashScreen": {
                "launchShowDuration": 2000,
                "backgroundColor": "#1D9E75",
                "showSpinner": false
              }
            },
            "packageClassList": [
              "CAPBrowserPlugin",
              "SplashScreenPlugin",
              "NativePurchasesPlugin",
              "PurchasesPlugin",
              "AppleSignInPlugin"
            ]
          }
          EOF
      - name: Verify capacitor.config.json
        script: |
          echo "=== capacitor.config.json content ==="
          cat ios/App/App/capacitor.config.json
      - name: Set build number
        script: cd ios/App && agvtool new-version -all $(expr 6 + $BUILD_NUMBER)
      - name: Build IPA
        script: |
          xcode-project use-profiles
          xcode-project build-ipa \
            --project ios/App/App.xcodeproj \
            --scheme App \
            --config Release
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
