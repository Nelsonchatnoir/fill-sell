workflows:
  capacitor-ios:
    name: Capacitor iOS Build
    max_build_duration: 60
    environment:
      node: 22
      xcode: latest
      vars:
        BUNDLE_ID: app.fillsell.app
      ios_signing:
        distribution_type: app_store
        bundle_identifier: app.fillsell.app
    integrations:
      app_store_connect: Codemagic
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Build web app
        script: npm run build
      - name: Sync Capacitor
        script: npx cap sync ios
      - name: Restore App.entitlements
        script: |
          cat > ios/App/App/App.entitlements << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>com.apple.developer.applesignin</key>
              <array>
                  <string>Default</string>
              </array>
          </dict>
          </plist>
          EOF
      - name: Fix capacitor.config.json
        script: |
          cat > ios/App/App/capacitor.config.json << 'EOF'
          {
            "appId": "app.fillsell.app",
            "appName": "Fill & Sell",
            "webDir": "dist",
            "server": { "androidScheme": "https" },
            "plugins": {
              "SplashScreen": {
                "launchShowDuration": 2000,
                "backgroundColor": "#1D9E75",
                "showSpinner": false
              }
            },
            "packageClassList": [
              "CAPBrowserPlugin",
              "SplashScreenPlugin",
              "NativePurchasesPlugin",
              "AppleSignInPlugin"
            ]
          }
          EOF
      - name: Verify capacitor.config.json
        script: |
          echo "=== capacitor.config.json content ==="
          cat ios/App/App/capacitor.config.json
      - name: Set build number
        script: |
          BUILD_NUMBER=$((CM_BUILD_NUMBER + 20))
          echo "CM_BUILD_NUMBER=$CM_BUILD_NUMBER → build number: $BUILD_NUMBER"
          cd ios/App && agvtool new-marketing-version 1.1 && agvtool new-version -all $BUILD_NUMBER
      - name: Build IPA
        script: |
          xcode-project use-profiles
          cat > /tmp/ExportOptions.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>BQ379Y93X3</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>app.fillsell.app</key>
              <string>FillSell AppStore</string>
            </dict>
            <key>signingCertificate</key>
            <string>Apple Distribution</string>
            <key>signingStyle</key>
            <string>manual</string>
          </dict>
          </plist>
          EOF
          xcode-project build-ipa \
            --project ios/App/App.xcodeproj \
            --scheme App \
            --config Release \
            --export-options-plist /tmp/ExportOptions.plist
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
